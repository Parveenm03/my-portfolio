<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
<style>
    {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        front-family: Arial, sans-serif;
    }
    body {
        background: linear-gradient(135deg, #0f2027, #2c5364);
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
    }
    /* Card Design */
    .card {
        background: white;
        width: 300px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        text-align: center;
        transition: 0.3s;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);

        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);

        transition: 0.3s;
    }
    .card:hover {
        transform: scale(1.05);
    }
    /* Image */
    .card img {
        width: 100px;
        border-radius: 50%;
        margin-bottom: 20px;
        border: 2px solid White;
    }
    /*  Text */
    .card h2 {
        margin-bottom: 10px;
    }
    .card p {
        color: grey;
        font-size: 14px;
        margin-bottom: 20px;
    }
/* Button */
.btn {
    background: #ff4b2b;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    display: inline-block;
    transition: 0.3s;
    text-decoration: none;
}
.btn:hover {
    background: white;
}
</style>

</head>
<body>
    <div class="card">
        <img src="https://i.pravatar.cc/150" alt="profile">
        <h2>Parveen 😎</h2>
        <p>Digital Creator</p>

        <a href="https://instagram.com/parveenmishra03" target="_blank" class="btn">
            Follow Me
        </a>
        
    </div>
</body>
